/* ── Circular Timer ── */
function CircularTimer({ seconds, color, onDone }){
  const [rem, setRem] = useState(seconds);
  const [done, setDone] = useState(false);
  useEffect(()=>{ setRem(seconds); setDone(false); },[seconds]);
  useEffect(()=>{
    if(done||rem<=0){ if(!done){ setDone(true); onDone&&onDone(); } return; }
    const t=setTimeout(()=>setRem(r=>r-1),1000);
    return()=>clearTimeout(t);
  },[rem,done]);
  const r=38, circ=2*Math.PI*r, pct=rem/seconds;
  return (
    <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:4 }}>
      <svg width="90" height="90" viewBox="0 0 90 90">
        <circle cx="45" cy="45" r={r} fill="none" stroke="#eee" strokeWidth="7"/>
        <circle cx="45" cy="45" r={r} fill="none" stroke={done?"#66BB6A":color} strokeWidth="7"
          strokeDasharray={circ} strokeDashoffset={done?0:circ*(1-pct)}
          strokeLinecap="round" transform="rotate(-90 45 45)" style={{ transition:"stroke-dashoffset .9s linear, stroke .3s" }}/>
        <text x="45" y="52" textAnchor="middle" fontSize="22" fontWeight="700" fill={done?"#66BB6A":color} fontFamily={FF}>
          {done?"✓":rem}
        </text>
      </svg>
      <span style={{ fontSize:11, color:"#aaa" }}>{done?"Completato!":"secondi"}</span>
    </div>
  );
}

/* ── Confetti ── */
const CPARTS = ["🎉","⭐","🌟","✨","🎊","💫","🎈","🌈","🏆","❤️"];
function Confetti({ onDone }){
  const parts = useRef(Array.from({length:60},(_,i)=>({
    id:i, x:Math.random()*100, delay:Math.random()*.8,
    dur:1.4+Math.random()*.9, emoji:CPARTS[i%CPARTS.length],
    size:22+Math.random()*22,
  }))).current;
  useEffect(()=>{ const t=setTimeout(onDone,3200); return()=>clearTimeout(t); },[]);
  return (
    <div style={{ position:"fixed", inset:0, pointerEvents:"none", zIndex:9999, overflow:"hidden" }} onClick={onDone}>
      {parts.map(p=>(
        <span key={p.id} style={{ position:"absolute", left:`${p.x}%`, top:0, fontSize:p.size, animation:`cfall ${p.dur}s ${p.delay}s ease-in forwards`, display:"block", lineHeight:1 }}>
          {p.emoji}
        </span>
      ))}
      {/* Messaggio centrale */}

/* ── PDF della storia ── */
function escHtml(s){ return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c])); }
function nomeFile(t){ return (String(t||"storia").trim().replace(/[\\/:*?"<>|]+/g,"-").replace(/\s+/g,"_").slice(0,60))||"storia"; }

/* Costruisce un nodo DOM (fuori schermo) con il layout della storia per il PDF */
function buildNodoPDF(routine){
  const wrap=document.createElement("div");
  wrap.style.cssText="position:fixed;left:-99999px;top:0;width:1000px;background:#ffffff;padding:32px;font-family:'Fredoka',cursive;box-sizing:border-box;";
  const ord=routine.tipo==="ordinaria";
  const bC=ord?"#2E7D32":"#E65100", bBg=ord?"#E8F5E9":"#FFF3E0", bBd=ord?"#81C784":"#FFB74D", bL=ord?"🔁 Routine":"⭐ Evento speciale";
  const acts=routine.attivita.map((a,idx)=>{
    const p=PM[a.pittogramma]; const isLast=idx===routine.attivita.length-1;
    const visual=(a.tipo==="foto"&&a.foto)
      ? `<img src="${a.foto}" style="width:80px;height:80px;border-radius:14px;object-fit:cover" />`
      : `<span style="font-size:60px;line-height:1">${(p&&p.emoji)||"❓"}</span>`;
    return `<div style="display:flex;align-items:center;gap:8px">
      <div style="display:flex;flex-direction:column;align-items:center;gap:8px;background:#FAFAFA;border-radius:16px;padding:16px 12px;border:2px solid #E8E8E8;width:140px">
        <span style="font-size:13px;color:#cccccc;font-weight:700">${idx+1}</span>
        ${visual}
        <span style="font-size:15px;text-align:center;color:#333333;font-weight:600;line-height:1.3">${escHtml(a.testo||(p&&p.label)||"")}</span>
        ${a.nota?`<span style="font-size:11px;text-align:center;color:#aaaaaa;font-style:italic;line-height:1.2">📝 ${escHtml(a.nota)}</span>`:""}
      </div>
      ${!isLast?`<span style="font-size:30px;color:${routine.colore};font-weight:700">→</span>`:""}
    </div>`;
  }).join("");
  wrap.innerHTML=`
    <div style="text-align:center;border-bottom:3px solid ${routine.colore};padding-bottom:16px;margin-bottom:24px">
      <h2 style="color:${routine.colore};margin:0 0 8px;font-size:34px">${escHtml(routine.titolo)}</h2>
      <span style="display:inline-block;padding:4px 14px;border-radius:20px;font-size:14px;font-weight:700;background:${bBg};color:${bC};border:2px solid ${bBd}">${bL}</span>
    </div>
    <div style="display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:12px">${acts}</div>
    <p style="text-align:center;margin-top:24px;font-size:13px;color:#cccccc">Creato con Storie Sociali</p>`;
  return wrap;
}

/* Genera un Blob PDF (A4 orizzontale) della storia */
async function generaPDFBlob(routine){
  const node=buildNodoPDF(routine);
  document.body.appendChild(node);
  let canvas;
  try{
    canvas=await html2canvas(node,{ scale:2, backgroundColor:"#ffffff", useCORS:true, logging:false });
  } finally {
    document.body.removeChild(node);
  }
  const { jsPDF }=window.jspdf;
  const pdf=new jsPDF({ orientation:"landscape", unit:"mm", format:"a4" });
  const pw=pdf.internal.pageSize.getWidth(), ph=pdf.internal.pageSize.getHeight();
  const m=8, availW=pw-m*2, availH=ph-m*2;
  const ratio=canvas.width/canvas.height;
  let iw=availW, ih=iw/ratio;
  if(ih>availH){ ih=availH; iw=ih*ratio; }
  const x=(pw-iw)/2, y=(ph-ih)/2;
  pdf.addImage(canvas.toDataURL("image/jpeg",0.95),"JPEG",x,y,iw,ih);
  return pdf.output("blob");
}

/* ── Condividi storia come PDF ── */
async function condividiStoria(routine){
  let blob;
  try{
    blob=await generaPDFBlob(routine);
  }catch(e){
    console.error("Errore creazione PDF",e);
    alert("⚠️ Impossibile creare il PDF. Riprova.");
    return;
  }
  const file=new File([blob], `${nomeFile(routine.titolo)}.pdf`, { type:"application/pdf" });
  /* condivisione nativa del file PDF (mobile / browser compatibili) */
  if(navigator.canShare && navigator.canShare({ files:[file] })){
    try{
      await navigator.share({ files:[file], title:routine.titolo, text:`📖 ${routine.titolo}` });
      return;
    }catch(e){ if(e&&e.name==="AbortError") return; }
  }
  /* fallback: scarica il PDF */
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url; a.download=file.name; document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1500);
  alert("📄 PDF della storia scaricato!\nOra puoi allegarlo o condividerlo dove vuoi.");
}

          <p style={{ color:tc.sub, fontSize:12, margin:"8px 0 0" }}>La foto rimane solo sul tuo dispositivo</p>
        </div>
        <label style={{ fontWeight:700, color:tc.text, fontSize:15, display:"block", marginBottom:6 }}>Nome del bambino</label>
        <input style={{ width:"100%", padding:"12px 16px", borderRadius:14, border:`2px solid ${t.primary}`, fontSize:16, fontFamily:FF, outline:"none", boxSizing:"border-box", background:tc.input, color:tc.text, marginBottom:20 }} placeholder="Es. Marco, Sofia..." value={nome} onChange={e=>setNome(e.target.value)}/>
        <label style={{ fontWeight:700, color:tc.text, fontSize:15, display:"block", marginBottom:10 }}>Sesso</label>
        <div style={{ display:"flex", gap:12, marginBottom:28 }}>
          {["maschio","femmina"].map(s=>(
            <button key={s} onClick={()=>setSesso(s)} style={{ flex:1, padding:"15px", borderRadius:18, border:`3px solid ${sesso===s?THEME[s].primary:"#eee"}`, background:sesso===s?THEME[s].light:"transparent", cursor:"pointer", fontFamily:FF, fontWeight:700, fontSize:cl(w,15,16,17), color:sesso===s?THEME[s].text:tc.sub, transition:"all .2s" }}>
              {s==="maschio"?"👦 Maschio":"👧 Femmina"}
            </button>
          ))}
        </div>
        <button onClick={()=>{ if(!nome.trim())return; onSave({ id:profilo?.id||Date.now(), nome, sesso, foto }); }} style={{ width:"100%", padding:"17px", borderRadius:20, background:t.gradient, border:"none", color:"white", fontSize:cl(w,17,18,20), fontWeight:700, fontFamily:FF, cursor:"pointer", boxShadow:`0 6px 20px ${t.primary}44` }}>
          Salva profilo ✨
        </button>
      </div>
    </Wrap>
  );
}

/* ══ EDITOR SCREEN ══ */
function EditorScreen({ routine, theme, onBack, onUpdate, w, dm }){
  const [r,setR]                   = useState(routine);
  const [showPicker,setShowPicker] = useState(false);
  const [catAttiva,setCatAttiva]   = useState(CATEGORIE[0].id);
  const [changingAttId,setChangingAttId] = useState(null); // null = aggiungi, altrimenti = cambia pittogramma
  const [editTitolo,setEditTitolo] = useState(false);
  const [titoloTemp,setTitoloTemp] = useState(routine.titolo);
  const [notaOpen,setNotaOpen]     = useState({});
  const [dragIdx,setDragIdx]       = useState(null);
  const [dragOverIdx,setDragOverIdx] = useState(null);
  const [salvato,setSalvato]       = useState(false);
  const fileRefs=useRef({}); const fotoRef=useRef(); const rowRefs=useRef([]);
  const tc=TC(dm); const pittCols=cl(w,4,5,6);

  function sync(u){ setR(u); onUpdate(u); }
  function salvaEsci(){ onUpdate(r); setSalvato(true); setTimeout(()=>{ setSalvato(false); onBack(); }, 850); }
  function aggiungiPitt(pid){
    const p=PM[pid];
    if(changingAttId){
      // modalità cambio: aggiorna pittogramma esistente
      updAtt(changingAttId,{pittogramma:pid,tipo:"pittogramma",foto:null,testo:p?.label||""});
      setChangingAttId(null);
    } else {
      sync({ ...r, attivita:[...r.attivita,{ id:Date.now(), pittogramma:pid, testo:p?.label||"", tipo:"pittogramma", nota:"", durata:0 }] });
    }
    setShowPicker(false);
  }
  function aggiungiFoto(e){ const f=e.target.files[0]; if(!f)return; const rd=new FileReader(); rd.onload=ev=>sync({ ...r, attivita:[...r.attivita,{ id:Date.now(), pittogramma:null, testo:"", tipo:"foto", foto:ev.target.result, nota:"", durata:0 }] }); rd.readAsDataURL(f); setShowPicker(false); }
  function rimuovi(id){ sync({ ...r, attivita:r.attivita.filter(a=>a.id!==id) }); }
  function updAtt(id,fields){ sync({ ...r, attivita:r.attivita.map(a=>a.id===id?{...a,...fields}:a) }); }
  function cambiaFoto(id,e){ const f=e.target.files[0]; if(!f)return; const rd=new FileReader(); rd.onload=ev=>updAtt(id,{foto:ev.target.result}); rd.readAsDataURL(f); }
  function salvaTitolo(){ sync({ ...r, titolo:titoloTemp }); setEditTitolo(false); }

  /* drag & drop */
  function startDrag(idx,e){ e.preventDefault(); setDragIdx(idx); }
  useEffect(()=>{
    if(dragIdx===null) return;
    function onMove(e){
      const y=e.clientY||(e.touches&&e.touches[0]?.clientY);
      if(y==null) return;
      rowRefs.current.forEach((ref,i)=>{
        if(!ref) return;
        const rect=ref.getBoundingClientRect();
        if(y>=rect.top&&y<=rect.bottom) setDragOverIdx(i);
      });
    }
    function onUp(){
      if(dragIdx!==null&&dragOverIdx!==null&&dragIdx!==dragOverIdx){
        const arr=[...r.attivita];
        const [item]=arr.splice(dragIdx,1);
        arr.splice(dragOverIdx,0,item);
        sync({ ...r, attivita:arr });
      }
      setDragIdx(null); setDragOverIdx(null);
    }
    document.addEventListener("pointermove",onMove);
    document.addEventListener("pointerup",onUp);
    return()=>{ document.removeEventListener("pointermove",onMove); document.removeEventListener("pointerup",onUp); };
  },[dragIdx,dragOverIdx,r]);

  return (
    <Wrap w={w} dm={dm}>
      <div style={{ background:`linear-gradient(90deg,${r.colore},${r.colore}aa)`, padding:cl(w,"14px 20px","16px 28px","18px 36px"), display:"flex", alignItems:"center", gap:12 }}>
        <button onClick={onBack} style={btnBack}>← Indietro</button>
        <div style={{ flex:1 }}>
          {editTitolo
            ?<div style={{ display:"flex", gap:6, alignItems:"center" }}>
               <input style={{ flex:1, padding:"6px 10px", borderRadius:10, border:"2px solid rgba(255,255,255,.6)", background:"rgba(255,255,255,.2)", color:"white", fontFamily:FF, fontSize:16, outline:"none" }} value={titoloTemp} onChange={e=>setTitoloTemp(e.target.value)}/>
               <button onClick={salvaTitolo} style={{ background:"rgba(255,255,255,.3)", border:"none", borderRadius:8, padding:"6px 10px", color:"white", fontFamily:FF, cursor:"pointer", fontWeight:700 }}>✓</button>
             </div>
            :<div style={{ display:"flex", alignItems:"center", gap:8 }}>
               <h1 style={{ color:"white", margin:0, fontSize:cl(w,16,18,20), fontWeight:700 }}>{r.titolo}</h1>
               <button onClick={()=>setEditTitolo(true)} style={{ background:"rgba(255,255,255,.25)", border:"none", borderRadius:8, padding:"4px 8px", color:"white", cursor:"pointer", fontSize:13 }}>✏️</button>
             </div>}
          <p style={{ color:"rgba(255,255,255,.8)", margin:0, fontSize:11 }}>{r.tipo==="ordinaria"?"🔁 Routine":"⭐ Speciale"}</p>
        </div>
        <button onClick={salvaEsci} style={{ background:"white", border:"none", borderRadius:12, padding:cl(w,"8px 12px","9px 16px","10px 18px"), color:r.colore, fontWeight:700, cursor:"pointer", fontSize:cl(w,13,14,15), fontFamily:FF, boxShadow:"0 2px 10px rgba(0,0,0,.2)", whiteSpace:"nowrap", flexShrink:0 }}>💾 Salva</button>
      </div>

      <div style={{ padding:cl(w,"10px 12px 100px","12px 16px 100px","16px 24px 100px") }}>
        {dragIdx!==null&&<div style={{ background:"#FFF9F0", border:"2px dashed #FFB347", borderRadius:12, padding:"8px 12px", marginBottom:10, fontSize:13, color:"#E65100", textAlign:"center" }}>🔀 Trascina per riordinare</div>}
        {r.attivita.length===0&&<div style={{ textAlign:"center", padding:"40px", color:tc.sub }}><div style={{ fontSize:52 }}>🎯</div><p style={{ marginTop:12 }}>Aggiungi la prima attività!</p></div>}

        {r.attivita.map((a,idx)=>{
          const p=PM[a.pittogramma];
          const isDraggingThis=dragIdx===idx;
          const isDragTarget=dragOverIdx===idx&&dragIdx!==idx;
          return (
            <div key={a.id} ref={el=>rowRefs.current[idx]=el}
              style={{ background:tc.card, borderRadius:16, marginBottom:10, border:`2px solid ${isDragTarget?r.colore:tc.border}`, boxShadow:isDragTarget?`0 0 0 3px ${r.colore}44`:"0 2px 10px rgba(0,0,0,.06)", opacity:isDraggingThis?.4:1, transition:"opacity .2s, border .2s" }}>
              <div style={{ display:"flex", alignItems:"center", gap:10, padding:"10px 12px" }}>
                {/* drag handle */}
                <div onPointerDown={e=>startDrag(idx,e)} style={{ fontSize:18, color:tc.sub, cursor:"grab", userSelect:"none", padding:"0 4px", touchAction:"none" }}>≡</div>
                <span style={{ fontSize:12, color:tc.sub, fontWeight:700, minWidth:18 }}>{idx+1}</span>
                {/* immagine + badge cambio tipo — tap sull'icona per sostituire */}
                <div style={{ position:"relative", flexShrink:0 }}>
                  <div onClick={()=>fileRefs.current[a.id]?.click()} style={{ cursor:"pointer" }}>
                    {a.tipo==="foto"&&a.foto
                      ?<img src={a.foto} style={{ width:52,height:52,borderRadius:14,objectFit:"cover",border:`2px solid ${tc.border}`,display:"block" }} alt=""/>
                      :a.tipo==="foto"
                        ?<div style={{ width:52,height:52,borderRadius:14,background:tc.card2,border:`2px dashed ${tc.sub}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22 }}>📷</div>
                        :<div onClick={e=>{e.stopPropagation();setChangingAttId(a.id);setShowPicker(true);}} style={{ width:52,height:52,borderRadius:14,background:tc.card2,border:`2px solid ${tc.border}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:32,cursor:"pointer" }} title="Tocca per cambiare pittogramma">{p?.emoji}</div>}
                  </div>
                  {/* badge cambio tipo — grande e touch-friendly */}
                  {a.tipo==="pittogramma"
                    ?<button onClick={()=>fileRefs.current[a.id]?.click()} title="Sostituisci con foto"
                        style={{ position:"absolute", bottom:-8, right:-8, width:26, height:26, borderRadius:13, background:"#FF9F43", border:"2px solid white", cursor:"pointer", fontSize:13, display:"flex", alignItems:"center", justifyContent:"center", boxShadow:"0 2px 6px rgba(0,0,0,.25)", padding:0 }}>📷</button>
                    :<button onClick={()=>updAtt(a.id,{tipo:"pittogramma",pittogramma:"gioco",foto:null})} title="Torna al pittogramma"
                        style={{ position:"absolute", bottom:-8, right:-8, width:26, height:26, borderRadius:13, background:"#667EEA", border:"2px solid white", cursor:"pointer", fontSize:13, display:"flex", alignItems:"center", justifyContent:"center", boxShadow:"0 2px 6px rgba(0,0,0,.25)", padding:0 }}>🎨</button>}
                  <input ref={el=>fileRefs.current[a.id]=el} type="file" accept="image/*" style={{ display:"none" }} onChange={e=>{
                    const f=e.target.files[0]; if(!f)return;
                    const rd=new FileReader(); rd.onload=ev=>updAtt(a.id,{tipo:"foto",foto:ev.target.result,pittogramma:null});
                    rd.readAsDataURL(f);
                  }}/>
                </div>
                <input style={{ flex:1, padding:"8px 10px", borderRadius:12, border:`2px solid ${tc.inputBorder}`, fontSize:14, fontFamily:FF, outline:"none", background:tc.input, color:tc.text }} value={a.testo} placeholder="Descrizione..." onChange={e=>updAtt(a.id,{testo:e.target.value})}/>
                {/* timer */}
                <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:2 }}>
                  <span style={{ fontSize:10, color:tc.sub }}>⏱</span>
                  <input type="number" min="0" max="300" value={a.durata||0} onChange={e=>updAtt(a.id,{durata:parseInt(e.target.value)||0})} style={{ width:44, padding:"4px 6px", borderRadius:8, border:`2px solid ${tc.inputBorder}`, fontSize:12, fontFamily:FF, outline:"none", textAlign:"center", background:tc.input, color:tc.text }}/>
                  <span style={{ fontSize:9, color:tc.sub }}>sec</span>
                </div>
                {/* nota */}
                <button onClick={()=>setNotaOpen(n=>({...n,[a.id]:!n[a.id]}))} style={{ background:notaOpen[a.id]?"#E8F5E9":tc.card2, border:`2px solid ${notaOpen[a.id]?"#81C784":tc.border}`, borderRadius:10, width:32, height:32, cursor:"pointer", fontSize:14, display:"flex", alignItems:"center", justifyContent:"center" }}>📝</button>
                <button onClick={()=>rimuovi(a.id)} style={{ background:"#FFE4E4", border:"none", borderRadius:10, width:32, height:32, cursor:"pointer", fontSize:16, color:"#FF6B6B", display:"flex", alignItems:"center", justifyContent:"center" }}>×</button>
              </div>
              {notaOpen[a.id]&&(
                <div style={{ padding:"0 12px 10px 12px" }}>
                  <textarea value={a.nota||""} onChange={e=>updAtt(a.id,{nota:e.target.value})} placeholder="Nota per il genitore (non visibile al bambino)..." style={{ width:"100%", padding:"8px 10px", borderRadius:12, border:`2px solid ${tc.inputBorder}`, fontSize:13, fontFamily:FF, outline:"none", resize:"none", height:60, background:dm?"#1a2e1a":"#F0FFF4", color:tc.text }} />
                </div>
              )}
            </div>
          );
        })}
        <button onClick={()=>setShowPicker(true)} style={{ ...aBtn(r.colore), width:"100%", marginTop:8, borderRadius:18, padding:cl(w,"14px","16px","18px"), fontSize:cl(w,15,16,17) }}>+ Aggiungi attività</button>
        <button onClick={salvaEsci} style={{ width:"100%", marginTop:12, borderRadius:18, padding:cl(w,"15px","17px","19px"), background:"linear-gradient(135deg,#2E7D32,#66BB6A)", border:"none", color:"white", fontSize:cl(w,16,17,18), fontWeight:700, fontFamily:FF, cursor:"pointer", boxShadow:"0 6px 20px rgba(46,125,50,.4)" }}>💾 Salva storia</button>
      </div>

      {showPicker&&(
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.5)", display:"flex", alignItems:"flex-end", justifyContent:"center", zIndex:200 }}>
          <div style={{ background:tc.card, borderRadius:"24px 24px 0 0", padding:"20px", width:"100%", maxWidth:cl(w,"100%",600,800), maxHeight:"80vh", overflow:"hidden", boxSizing:"border-box", display:"flex", flexDirection:"column" }}>
            <h3 style={{ margin:"0 0 14px", textAlign:"center", fontFamily:FF, fontSize:18, color:tc.text }}>
              {changingAttId?"Cambia pittogramma":"Aggiungi attività"}
            </h3>
            {!changingAttId&&<div style={{ marginBottom:14, paddingBottom:14, borderBottom:`2px solid ${tc.border}` }}>
              <button onClick={()=>fotoRef.current.click()} style={{ width:"100%", padding:"13px", borderRadius:16, background:dm?"#2D1A00":"#FFF3E0", border:"2px dashed #FFB347", cursor:"pointer", fontFamily:FF, fontWeight:700, fontSize:15, color:"#E65100" }}>📷 Scegli foto dalla libreria</button>
              <input ref={fotoRef} type="file" accept="image/*" style={{ display:"none" }} onChange={aggiungiFoto}/>
            </div>}
            <div style={{ display:"flex", gap:6, overflowX:"auto", paddingBottom:10, marginBottom:10, flexShrink:0 }}>
              {CATEGORIE.map(c=>(
                <button key={c.id} onClick={()=>setCatAttiva(c.id)} style={{ flexShrink:0, padding:"7px 12px", borderRadius:20, border:`2px solid ${catAttiva===c.id?r.colore:tc.border}`, background:catAttiva===c.id?r.colore+"22":tc.card2, cursor:"pointer", fontFamily:FF, fontWeight:600, fontSize:13, color:catAttiva===c.id?r.colore:tc.sub, whiteSpace:"nowrap" }}>
                  {c.emoji} {c.label}
                </button>
              ))}
            </div>
            <div style={{ overflowY:"auto", flex:1 }}>
              <div style={{ display:"grid", gridTemplateColumns:`repeat(${pittCols},1fr)`, gap:10 }}>
                {CATEGORIE.find(c=>c.id===catAttiva)?.items.map(p=>(
                  <button key={p.id} onClick={()=>aggiungiPitt(p.id)} style={{ background:tc.card2, border:`2px solid ${tc.border}`, borderRadius:16, padding:cl(w,"10px 6px","12px 6px","14px 8px"), cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:4 }}>
                    <span style={{ fontSize:cl(w,28,30,34) }}>{p.emoji}</span>
                    <span style={{ fontSize:10, color:tc.sub, fontFamily:FF, textAlign:"center", lineHeight:1.2 }}>{p.label}</span>
                  </button>
                ))}
              </div>
            </div>
            <button onClick={()=>{setShowPicker(false);setChangingAttId(null);}} style={{ ...aBtn("#aaa"), width:"100%", marginTop:12, borderRadius:16, flexShrink:0 }}>Annulla</button>
          </div>
        </div>
      )}

      {salvato&&(
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.45)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:300 }}>
          <div style={{ background:"white", borderRadius:24, padding:"28px 40px", textAlign:"center", boxShadow:"0 12px 40px rgba(0,0,0,.25)", animation:"cpop .4s both" }}>
            <div style={{ fontSize:52, marginBottom:8 }}>💾</div>
            <div style={{ fontSize:20, fontWeight:700, color:"#2E7D32", fontFamily:FF }}>Storia salvata!</div>
          </div>
        </div>
      )}
    </Wrap>
  );
}

/* ══ ROOT APP ══ */
function App(){
  const w=useW();
  const [dm,setDm]                     = useState(()=>LS.get("ssv2_dark",false));
  const [onboarded,setOnboarded]       = useState(()=>LS.get("ssv2_onboarded",false));
  const [profili,setProfili]           = useState(()=>LS.get("ssv2_profili",[]));
  const [routinesDB,setRoutinesDB]     = useState(()=>LS.get("ssv2_routines",{}));
  const [profiloAttivo,setProfiloAttivo] = useState(null);
  const [screen,setScreen]             = useState("profili");
  const [editingRoutine,setEditingRoutine]   = useState(null);
  const [selectedRoutine,setSelectedRoutine] = useState(null);
  const [currentStep,setCurrentStep]   = useState(0);
  const [showNewForm,setShowNewForm]   = useState(false);
  const [newTitolo,setNewTitolo]       = useState("");
  const [newTipo,setNewTipo]           = useState("ordinaria");
  const [newColore,setNewColore]       = useState(PALETTE[3]);
  const [editingProfilo,setEditingProfilo] = useState(null);
  const [storageWarn,setStorageWarn]   = useState(false);
  const [timerKey,setTimerKey]         = useState(0);
  const [showConfetti,setShowConfetti] = useState(false);

  const theme = profiloAttivo?THEME[profiloAttivo.sesso]:THEME.maschio;
  const tc    = TC(dm);
  const profCols = cl(w,2,3,4);

  useEffect(()=>{ document.body.style.background=dm?"#050510":""; },[dm]);
  useEffect(()=>{ if(!LS.set("ssv2_dark",dm)) {} },[dm]);
  useEffect(()=>{ if(!LS.set("ssv2_profili",profili)) setStorageWarn(true); },[profili]);
  useEffect(()=>{ if(!LS.set("ssv2_routines",routinesDB)) setStorageWarn(true); },[routinesDB]);
  useEffect(()=>{ setTimerKey(k=>k+1); },[currentStep]);

  if(!onboarded) return <Onboarding onDone={()=>{ LS.set("ssv2_onboarded",true); setOnboarded(true); }} w={w}/>;

  const getRoutines=()=>profiloAttivo?(routinesDB[profiloAttivo.id]||[]):[];
  const setRoutines=(list)=>setRoutinesDB(db=>({...db,[profiloAttivo.id]:list}));
  function salvaProfilo(p){ setProfili(prev=>prev.some(x=>x.id===p.id)?prev.map(x=>x.id===p.id?p:x):[...prev,p]); if(profiloAttivo?.id===p.id) setProfiloAttivo(p); }
  function creaRoutina(){ if(!newTitolo.trim())return; const n={id:Date.now(),titolo:newTitolo,tipo:newTipo,colore:newColore,attivita:[]}; setRoutines([...getRoutines(),n]); setEditingRoutine(n); setNewTitolo(""); setShowNewForm(false); setScreen("editor"); }
  function aggiornaRoutina(u){ setEditingRoutine(u); setRoutines(getRoutines().map(r=>r.id===u.id?u:r)); }
  function eliminaRoutina(id){ setRoutines(getRoutines().filter(r=>r.id!==id)); }
  function caricaPreset(p){ const copy={...p, id:Date.now(), attivita:p.attivita.map((a,i)=>({...a,id:Date.now()+i,nota:"",durata:0}))}; setRoutines([...getRoutines(),copy]); setScreen("home"); }

  const Warn=()=>storageWarn?(<div style={{ background:"#FFF3CD", borderBottom:"2px solid #FFD600", padding:"10px 16px", display:"flex", justifyContent:"space-between", alignItems:"center" }}><span style={{ fontSize:13, color:"#856404" }}>⚠️ Memoria quasi piena. Rimuovi alcune foto.</span><button onClick={()=>setStorageWarn(false)} style={{ background:"none", border:"none", cursor:"pointer", fontSize:18 }}>×</button></div>):null;

  if(screen==="nuovoProfilo") return <ProfiloScreen profilo={editingProfilo} onSave={p=>{ salvaProfilo(p); setScreen("profili"); }} onBack={()=>setScreen("profili")} w={w} dm={dm}/>;
  if(screen==="pdf"&&selectedRoutine) return <Wrap w={w} dm={dm}><PDFScreen routine={selectedRoutine} onBack={()=>setScreen("home")} w={w} dm={dm}/></Wrap>;
  if(screen==="editor"&&editingRoutine) return <EditorScreen routine={editingRoutine} theme={theme} onBack={()=>setScreen("home")} onUpdate={aggiornaRoutina} w={w} dm={dm}/>;
  if(screen==="libreria") return <LibreriaScreen onBack={()=>setScreen("home")} onCarica={caricaPreset} w={w} dm={dm}/>;

  /* ── BAMBINO ── */
  if(screen==="bambino"&&selectedRoutine){
    const att=selectedRoutine.attivita, step=att[currentStep], p=PM[step?.pittogramma], isLast=currentStep===att.length-1;
    const imgSz=cl(w,160,200,240), emFz=cl(w,90,110,130);
    return (
      <Wrap bg={dm?tc.bg:`linear-gradient(135deg,${selectedRoutine.colore}22,${selectedRoutine.colore}11)`} w={w} dm={dm}>
        <div style={{ background:`linear-gradient(90deg,${selectedRoutine.colore},${selectedRoutine.colore}bb)`, padding:cl(w,"14px 20px","16px 28px","18px 36px"), display:"flex", alignItems:"center", gap:12 }}>
          <button onClick={()=>setScreen("home")} style={btnBack}>← Esci</button>
          <h1 style={{ color:"white", margin:0, fontSize:cl(w,17,19,22), fontWeight:700 }}>{selectedRoutine.titolo}</h1>
        </div>
        <div style={{ display:"flex", justifyContent:"center", gap:8, padding:"16px 0 0" }}>
          {att.map((_,i)=><div key={i} style={{ height:10, borderRadius:5, transition:"all .3s", width:i===currentStep?28:10, background:i<=currentStep?selectedRoutine.colore:tc.border }}/>)}
        </div>
        <div style={{ background:tc.card, borderRadius:28, margin:cl(w,14,18,24), padding:cl(w,"28px 20px","32px 28px","40px 36px"), boxShadow:"0 8px 32px rgba(0,0,0,.1)", textAlign:"center", minHeight:cl(w,260,300,340), display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:16 }}>
          {step?.tipo==="foto"&&step?.foto?<img src={step.foto} style={{ width:imgSz,height:imgSz,borderRadius:24,objectFit:"cover",boxShadow:"0 4px 16px rgba(0,0,0,.15)" }} alt=""/>:<span style={{ fontSize:emFz }}>{p?.emoji}</span>}
          <h2 style={{ fontSize:cl(w,26,30,34), color:tc.text, margin:0, fontWeight:700 }}>{step?.testo}</h2>
          {step?.durata>0&&<CircularTimer key={`${timerKey}-${step.id}`} seconds={step.durata} color={selectedRoutine.colore}/>}
          <p style={{ color:tc.sub, fontSize:cl(w,13,15,16), margin:0 }}>Passo {currentStep+1} di {att.length}</p>
        </div>
        <div style={{ display:"flex", gap:12, padding:cl(w,"0 14px","0 18px","0 24px") }}>
          {currentStep>0&&<button onClick={()=>setCurrentStep(currentStep-1)} style={{ ...aBtn("#aaa"), flex:1, fontSize:cl(w,16,18,20) }}>← Prima</button>}
          {!isLast?<button onClick={()=>setCurrentStep(currentStep+1)} style={{ ...aBtn(selectedRoutine.colore), flex:1, fontSize:cl(w,16,18,20) }}>Dopo →</button>:<button onClick={()=>setShowConfetti(true)} style={{ ...aBtn("#66BB6A"), flex:1, fontSize:cl(w,16,18,20) }}>🎉 Finito!</button>}
        </div>
        {showConfetti&&<Confetti onDone={()=>{ setShowConfetti(false); setScreen("home"); }}/>}
      </Wrap>
    );
  }

  /* ── HOME BAMBINO ── */
  if(screen==="home"){
    const lista=getRoutines();
    return (
      <Wrap bg={dm?tc.bg:theme.secondary} w={w} dm={dm}>
        <Warn/>
        <div style={{ background:theme.gradient, padding:cl(w,"14px 20px","16px 28px","18px 36px") }}>
          <div style={{ display:"flex", alignItems:"center", gap:12 }}>
            <button onClick={()=>setScreen("profili")} style={btnBack}>← Profili</button>
            <div style={{ width:44, height:44, borderRadius:22, background:"rgba(255,255,255,.3)", display:"flex", alignItems:"center", justifyContent:"center", overflow:"hidden", border:"2px solid rgba(255,255,255,.6)" }}>
              {profiloAttivo.foto?<img src={profiloAttivo.foto} style={{ width:"100%",height:"100%",objectFit:"cover" }} alt=""/>:<span style={{ fontSize:24 }}>{profiloAttivo.sesso==="maschio"?"👦":"👧"}</span>}
            </div>
            <div style={{ flex:1 }}>
              <h1 style={{ color:"white", margin:0, fontSize:cl(w,18,20,22), fontWeight:700 }}>{profiloAttivo.nome}</h1>
              <p style={{ color:"rgba(255,255,255,.8)", margin:0, fontSize:12 }}>Le mie storie</p>
            </div>
            <DMToggle dm={dm} onToggle={()=>setDm(d=>!d)}/>
          </div>
        </div>
        <div style={{ padding:cl(w,"6px 0 80px","8px 0 80px","10px 0 80px") }}>
          {lista.length===0&&<div style={{ textAlign:"center", padding:"40px 20px", color:tc.sub }}><div style={{ fontSize:56 }}>📖</div><p style={{ marginTop:12 }}>Nessuna storia ancora!<br/>Usa il + o la 📚 Libreria.</p></div>}
          {lista.map(r=>(
            <RoutineCard key={r.id} r={r} w={w} dm={dm}
              onShow={()=>{ setSelectedRoutine(r); setCurrentStep(0); setScreen("bambino"); }}
              onEdit={()=>{ setEditingRoutine(r); setScreen("editor"); }}
              onPdf={()=>{ setSelectedRoutine(r); setScreen("pdf"); }}
              onDelete={()=>eliminaRoutina(r.id)}
            />
          ))}
          {showNewForm&&(
            <div style={{ background:tc.card, borderRadius:20, margin:cl(w,"10px 12px","12px 16px","14px 20px"), padding:cl(w,14,16,20), boxShadow:"0 4px 20px rgba(0,0,0,.1)", border:`3px solid ${theme.primary}` }}>
              <h3 style={{ margin:"0 0 12px", color:theme.primary, fontSize:18 }}>✨ Nuova storia</h3>
              <input style={{ width:"100%", padding:"12px 16px", borderRadius:14, border:`2px solid ${theme.primary}`, fontSize:16, fontFamily:FF, outline:"none", boxSizing:"border-box", background:tc.input, color:tc.text, marginBottom:12 }} placeholder="Nome (es. Oggi dal dottore!)" value={newTitolo} onChange={e=>setNewTitolo(e.target.value)}/>
              <div style={{ display:"flex", gap:8, marginBottom:12 }}>
                {["ordinaria","straordinaria"].map(t=>(
                  <button key={t} onClick={()=>setNewTipo(t)} style={{ flex:1, padding:"10px", borderRadius:14, border:`2px solid ${newTipo===t?theme.primary:tc.border}`, background:newTipo===t?theme.light:"transparent", cursor:"pointer", fontFamily:FF, fontWeight:600, fontSize:13, color:newTipo===t?theme.text:tc.sub }}>
                    {t==="ordinaria"?"🔁 Routine":"⭐ Speciale"}
                  </button>
                ))}
              </div>
              <div style={{ display:"flex", gap:8, marginBottom:14, flexWrap:"wrap" }}>
                {PALETTE.map(c=><div key={c} onClick={()=>setNewColore(c)} style={{ width:28, height:28, borderRadius:14, background:c, cursor:"pointer", border:newColore===c?"3px solid #333":"3px solid transparent" }}/>)}
              </div>
              <div style={{ display:"flex", gap:8 }}>
                <button onClick={creaRoutina} style={{ ...aBtn(theme.primary), flex:2 }}>Crea ✨</button>
                <button onClick={()=>setShowNewForm(false)} style={{ background:dm?"#2D2D4E":"#F5F5F5", border:"none", borderRadius:14, padding:"10px 14px", cursor:"pointer", fontFamily:FF, fontWeight:700, color:tc.sub }}>✕</button>
              </div>
            </div>
          )}
        </div>
        {/* FAB */}
        {!showNewForm&&(
          <div style={{ position:"fixed", bottom:24, right:24, display:"flex", flexDirection:"column", gap:10, alignItems:"flex-end" }}>
            <button onClick={()=>setScreen("libreria")} style={{ ...aBtn("#667EEA"), borderRadius:20, padding:"10px 16px", fontSize:14, whiteSpace:"nowrap" }}>📚 Libreria</button>
            <button onClick={()=>setShowNewForm(true)} style={{ width:cl(w,56,60,68), height:cl(w,56,60,68), borderRadius:34, background:theme.gradient, border:"none", color:"white", fontSize:cl(w,28,30,34), cursor:"pointer", boxShadow:`0 6px 20px ${theme.primary}66`, display:"flex", alignItems:"center", justifyContent:"center" }}>+</button>
          </div>
        )}
      </Wrap>
    );
  }

  /* ── HOME PROFILI ── */
  return (
    <Wrap w={w} dm={dm}>
      <Warn/>
      <div style={{ padding:cl(w,"28px 20px 14px","32px 28px 16px","36px 36px 18px"), display:"flex", alignItems:"center", justifyContent:"space-between" }}>
        <div>
          <p style={{ margin:0, fontSize:cl(w,13,14,15), color:tc.sub, fontWeight:500 }}>{getGreeting()} 👋</p>
          <h1 style={{ margin:"2px 0 0", fontSize:cl(w,26,30,34), fontWeight:700, color:tc.text, lineHeight:1.1 }}>Le mie<br/><span style={{ color:"#667EEA" }}>Storie Sociali</span></h1>
        </div>
        <div style={{ display:"flex", flexDirection:"column", alignItems:"flex-end", gap:8 }}>
          <div style={{ width:cl(w,48,56,64), height:cl(w,48,56,64), borderRadius:32, background:"linear-gradient(135deg,#667EEA,#764BA2)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:cl(w,24,28,32), boxShadow:"0 4px 16px rgba(102,126,234,.4)" }}>📖</div>
          <DMToggle dm={dm} onToggle={()=>setDm(d=>!d)}/>
        </div>
      </div>
      <div style={{ padding:cl(w,"0 20px 14px","0 28px 16px","0 36px 18px") }}>
        <p style={{ margin:0, fontSize:cl(w,13,15,16), color:tc.sub }}>{profili.length===0?"Crea il primo profilo per iniziare!":profili.length===1?"1 profilo attivo":`${profili.length} profili attivi`}</p>
      </div>
      <div style={{ height:2, background:"linear-gradient(90deg,#667EEA22,#764BA222)", margin:cl(w,"0 20px 16px","0 28px 18px","0 36px 20px") }}/>
      <div style={{ padding:cl(w,"0 12px 100px","0 16px 100px","0 24px 100px") }}>
        {profili.length===0&&<div style={{ textAlign:"center", padding:"40px 20px" }}><div style={{ fontSize:64, marginBottom:12 }}>👶</div><p style={{ color:tc.sub, fontSize:15 }}>Nessun bambino ancora!</p></div>}
        <div style={{ display:"grid", gridTemplateColumns:`repeat(${profCols},1fr)`, gap:cl(w,10,14,18) }}>
          {profili.map(p=>{
            const t=THEME[p.sesso]; const n=(routinesDB[p.id]||[]).length;
            return (
              <div key={p.id} style={{ background:tc.card, borderRadius:20, padding:cl(w,12,14,18), boxShadow:`0 4px 20px ${t.primary}22`, border:`2px solid ${dm?tc.border:t.light}` }}>
                <div onClick={()=>{ setProfiloAttivo(p); setScreen("home"); }} style={{ cursor:"pointer", textAlign:"center" }}>
                  <div style={{ width:cl(w,60,70,80), height:cl(w,60,70,80), borderRadius:40, margin:"0 auto 10px", background:t.gradient, display:"flex", alignItems:"center", justifyContent:"center", overflow:"hidden", border:`3px solid ${t.primary}` }}>
                    {p.foto?<img src={p.foto} style={{ width:"100%",height:"100%",objectFit:"cover" }} alt=""/>:<span style={{ fontSize:cl(w,28,32,38) }}>{p.sesso==="maschio"?"👦":"👧"}</span>}
                  </div>
                  <div style={{ fontWeight:700, fontSize:cl(w,15,16,18), color:tc.text }}>{p.nome}</div>
                  <div style={{ fontSize:12, color:tc.sub, marginTop:2 }}>{n===0?"Nessuna storia":n===1?"1 storia":`${n} storie`}</div>
                  <div style={{ marginTop:6, display:"inline-block", padding:"3px 10px", borderRadius:20, background:dm?"rgba(255,255,255,.1)":t.light, color:dm?"white":t.text, fontSize:11, fontWeight:700 }}>{p.sesso==="maschio"?"💙":"🩷"} {p.sesso==="maschio"?"Maschio":"Femmina"}</div>
                </div>
                <button onClick={()=>{ setEditingProfilo(p); setScreen("nuovoProfilo"); }} style={{ display:"block", width:"100%", marginTop:10, background:dm?"rgba(255,255,255,.08)":t.light, border:`2px solid ${t.primary}`, borderRadius:10, padding:"6px", cursor:"pointer", fontFamily:FF, fontWeight:600, color:dm?"white":t.text, fontSize:12 }}>✏️ Modifica</button>
              </div>
            );
          })}
        </div>
        <div style={{ marginTop:cl(w,12,16,20), display:"flex", flexDirection:"column", gap:10 }}>
          <button onClick={()=>{ LS.set("ssv2_onboarded",false); setOnboarded(false); }} style={{ width:"100%", padding:"11px", borderRadius:14, background:dm?"rgba(255,255,255,.06)":"#F5F5F5", border:"none", color:tc.sub, fontSize:cl(w,13,14,15), fontFamily:FF, fontWeight:600, cursor:"pointer" }}>📖 Rivedi il tutorial</button>
          <button onClick={()=>{ setEditingProfilo(null); setScreen("nuovoProfilo"); }} style={{ width:"100%", padding:cl(w,"15px","16px","18px"), borderRadius:20, background:"linear-gradient(135deg,#667EEA,#764BA2)", border:"none", color:"white", fontSize:cl(w,16,17,18), fontWeight:700, fontFamily:FF, cursor:"pointer", boxShadow:"0 4px 16px rgba(102,126,234,.35)" }}>+ Aggiungi bambino</button>
        </div>
      </div>
    </Wrap>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

/* ── PWA Service Worker ── */
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    const sw = `
const CACHE='ss-v2';
const URLS=[self.location.href.replace(/sw.*$/,'')];
self.addEventListener('install',e=>e.waitUntil(caches.open(CACHE).then(c=>c.addAll(URLS)).then(()=>self.skipWaiting())));
self.addEventListener('activate',e=>e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==CACHE).map(k=>caches.delete(k)))).then(()=>self.clients.claim())));
self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{ if(res.ok){ const c=res.clone(); caches.open(CACHE).then(cache=>cache.put(e.request,c)); } return res; }))));
`;
    try{
      const blob=new Blob([sw],{type:'application/javascript'});
      const url=URL.createObjectURL(blob);
      navigator.serviceWorker.register(url).catch(()=>{});
    }catch(e){}
  });
}
</script>
</body>
</html>
